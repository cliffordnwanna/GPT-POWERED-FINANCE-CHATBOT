# .github/workflows/azure-deploy.yml
#
# Deploy Finance Intelligence System to Azure Container Apps.
#
# TRIGGER: Runs automatically on every push to the `main` branch.
#
# PREREQUISITES — add these secrets in your GitHub repo
#   (Settings → Secrets and variables → Actions → New repository secret):
#
#   AZURE_CREDENTIALS         Output of: az ad sp create-for-rbac \
#                               --name "finance-intelligence-deploy" \
#                               --role contributor \
#                               --scopes /subscriptions/YOUR_SUB_ID \
#                               --sdk-auth
#
#   REGISTRY_LOGIN_SERVER     e.g. yourregistry.azurecr.io
#   REGISTRY_USERNAME         ACR admin username
#   REGISTRY_PASSWORD         ACR admin password
#   OPENAI_API_KEY            Your OpenAI API key
#   RESOURCE_GROUP            e.g. finance-intelligence-rg
#   CONTAINERAPP_NAME         e.g. finance-intelligence
#   CONTAINERAPP_ENV          e.g. finance-intelligence-env
#
# FIRST-TIME SETUP (run once from your local machine):
#
#   az group create --name finance-intelligence-rg --location australiaeast
#
#   az acr create \
#     --resource-group finance-intelligence-rg \
#     --name YOUR_REGISTRY_NAME \
#     --sku Basic \
#     --admin-enabled true
#
#   az containerapp env create \
#     --name finance-intelligence-env \
#     --resource-group finance-intelligence-rg \
#     --location australiaeast

name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: finance-intelligence

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout source
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Authenticate to Azure
      # ------------------------------------------------------------------ #
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ------------------------------------------------------------------ #
      # 3. Build and push Docker image to Azure Container Registry
      # ------------------------------------------------------------------ #
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ------------------------------------------------------------------ #
      # 4. Deploy to Azure Container Apps
      # ------------------------------------------------------------------ #
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          containerAppName: ${{ secrets.CONTAINERAPP_NAME }}
          containerAppEnvironment: ${{ secrets.CONTAINERAPP_ENV }}
          imageToDeploy: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          targetPort: 8501
          ingress: external
          environmentVariables: |
            OPENAI_API_KEY=secretref:openai-key
          secrets: |
            openai-key=${{ secrets.OPENAI_API_KEY }}

      # ------------------------------------------------------------------ #
      # 5. Print live URL
      # ------------------------------------------------------------------ #
      - name: Print deployment URL
        run: |
          URL=$(az containerapp show \
            --name ${{ secrets.CONTAINERAPP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "Live app: https://$URL"
