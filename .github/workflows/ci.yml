# .github/workflows/ci.yml
#
# Continuous Integration for the GPT-Powered Finance Chatbot.
#
# This workflow runs on every push to main and on every pull request targeting
# main. It performs three checks in order:
#
#   1. Install dependencies       — ensures all packages are resolvable
#   2. Lint with flake8           — enforces code style (errors only, no warnings)
#   3. Test with pytest           — runs the full unit test suite
#
# The OPENAI_API_KEY is set to a dummy value so config.validate() passes
# without requiring a real key in CI. No live API calls are made — all
# external I/O is mocked in the test suite.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and Test (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E,F --extend-ignore=E501,E402 --exclude=.git,__pycache__,data,logs,.env --show-source --statistics

      - name: Run tests with pytest
        env:
          OPENAI_API_KEY: "ci-test-key-not-real"
        run: |
          python -m pip install pytest
          pytest tests/ --tb=short -v
